<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Weather</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        body { 
            font-family: 'Space Grotesk', sans-serif;
            background: #050505;
            color: white;
        }
        .main-card {
            background: linear-gradient(145deg, rgba(20,20,20,0.9), rgba(0,0,0,1));
            border: 1px solid #333;
            box-shadow: 0 0 40px rgba(59, 130, 246, 0.1);
        }
        .neon-accent {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6">

    <div class="main-card w-full max-w-md rounded-[2.5rem] p-10 relative overflow-hidden">
        
        <div class="flex justify-between items-center mb-12">
            <span class="text-xs font-bold tracking-[0.3em] text-blue-500 uppercase">Live Radar</span>
            <div class="h-2 w-2 rounded-full bg-blue-500 animate-ping"></div>
        </div>

        <div class="relative mb-12">
            <input id="cityInput" type="text" placeholder="Enter City (e.g. Warangal)" 
                class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 outline-none focus:border-blue-500 transition-all">
            <button onclick="getWeather()" class="absolute right-2 top-2 bg-blue-600 p-2.5 rounded-xl hover:bg-blue-500 transition-all">
                <i class="fas fa-search"></i>
            </button>
        </div>

        <div id="weatherContent" class="text-center hidden">
            <h1 id="cityName" class="text-4xl font-bold mb-2 tracking-tight">---</h1>
            <p id="condition" class="text-blue-400 uppercase tracking-widest text-xs font-bold mb-8">---</p>
            
            <div class="flex justify-center items-baseline mb-12">
                <span id="temp" class="text-9xl font-bold tracking-tighter neon-accent">--</span>
                <span class="text-4xl font-light text-blue-500 ml-2">°</span>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-white/5 rounded-3xl p-6 border border-white/5">
                    <p class="text-[10px] text-white/40 uppercase mb-1">Humidity</p>
                    <p id="humidity" class="text-xl font-bold">--%</p>
                </div>
                <div class="bg-white/5 rounded-3xl p-6 border border-white/5">
                    <p class="text-[10px] text-white/40 uppercase mb-1">Wind</p>
                    <p id="wind" class="text-xl font-bold">-- km/h</p>
                </div>
            </div>
        </div>

        <div id="loader" class="hidden text-center py-20 text-blue-500 italic animate-pulse">Scanning Atmosphere...</div>
        
        <div id="placeholder" class="text-center py-20 opacity-30">
            <i class="fas fa-satellite text-4xl mb-4"></i>
            <p class="text-sm tracking-widest uppercase">Awaiting Input</p>
        </div>

    </div>

    <script>
        async function getWeather() {
            const city = document.getElementById('cityInput').value.trim();
            if (!city) return;

            document.getElementById('placeholder').classList.add('hidden');
            document.getElementById('weatherContent').classList.add('hidden');
            document.getElementById('loader').classList.remove('hidden');

            try {
                // Using wttr.in with JSON format - NO API KEY REQUIRED
                const response = await fetch(`https://wttr.in/${city}?format=j1`);
                const data = await response.json();

                const current = data.current_condition[0];
                const area = data.nearest_area[0];

                document.getElementById('cityName').innerText = city;
                document.getElementById('temp').innerText = current.temp_C;
                document.getElementById('condition').innerText = current.weatherDesc[0].value;
                document.getElementById('humidity').innerText = current.humidity + "%";
                document.getElementById('wind').innerText = current.windspeedKmph + " km/h";

                document.getElementById('loader').classList.add('hidden');
                document.getElementById('weatherContent').classList.remove('hidden');
            } catch (error) {
                alert("Could not find city. Try again!");
                document.getElementById('loader').classList.add('hidden');
                document.getElementById('placeholder').classList.remove('hidden');
            }
        }
        
        document.getElementById('cityInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') getWeather();
        });
    </script>
</body>
</html>
